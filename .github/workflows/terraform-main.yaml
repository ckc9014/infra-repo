name: Terraform CI/CD

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform/**'
  push:
    branches: [ main ]
    paths:
      - 'terraform/**'
  workflow_dispatch:   

permissions:
  id-token: write   # Required for OIDC authentication
  contents: read 
  
jobs:
  plan:
    uses: ./.github/workflows/terraform-plan.yml
    with:
      working_directory: ./terraform
      aws_role_arn: ${{ vars.AWS_ROLE_ARN }}
      aws_region: ${{ vars.AWS_REGION }}
      tf_state_bucket: ${{ vars.TF_STATE_BUCKET }}
      # Use prod key only on main branch; otherwise dev key 
      tf_state_key: ${{ github.ref == 'refs/heads/main' && 'infra/prod/terraform.tfstate' || 'infra/dev/terraform.tfstate' }}

  apply:
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/terraform-apply.yml
    with:
      working_directory: ./terraform
      aws_role_arn: ${{ vars.AWS_ROLE_ARN }}
      aws_region: ${{ vars.AWS_REGION }}
      tf_state_bucket: ${{ vars.TF_STATE_BUCKET }}
      tf_state_key: ${{ github.ref == 'refs/heads/main' && 'infra/prod/terraform.tfstate' || 'infra/dev/terraform.tfstate' }}
      
  create_arc_secret:
    runs-on: ubuntu-latest
    needs: apply
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Configure kubectl
        run: aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name ${{ needs.apply.outputs.cluster_name }}

      - name: Create ARC GitHub App secret in cluster
        run: |
          kubectl create namespace arc-systems --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic github-app-auth \
            -n arc-systems \
            --dry-run=client \
            --from-literal=cluster_name=${{ needs.apply.outputs.cluster_name }} \
            --from-literal=cluster_endpoint=${{ needs.apply.outputs.cluster_endpoint }} \
            --from-literal=github_app_id=${{ secrets.ARC_APP_ID }} \
            --from-literal=github_app_installation_id=${{ secrets.ARC_APP_INSTALLATION_ID }} \
            --from-literal=github_app_private_key="${{ secrets.ARC_APP_PRIVATE_KEY }}" \
            -o yaml | kubectl apply -f -