name: Destroy Infrastructure

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform and AWS
        uses: ./.github/actions/setup-terraform-oidc
        with:
          aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          working-directory: ./terraform/infrastructure
          tf-state-bucket: ${{ vars.TF_STATE_BUCKET }}
          tf-state-key: ${{ github.ref == 'refs/heads/main' && 'infra/prod/terraform.tfstate' || 'infra/dev/terraform.tfstate' }}

      - name: Terraform Destroy
        working-directory: ./terraform/infrastructure
        run: terraform destroy -auto-approve -var-file="envs/${{ github.ref == 'refs/heads/main' && 'prod' || 'dev' }}.tfvars"