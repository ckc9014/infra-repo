name: Terraform Dev

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action (apply or destroy)'
        required: true
        type: choice
        options:
          - apply
          - destroy

permissions:
  id-token: write   # Required for OIDC authentication
  contents: read 

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform and AWS
        uses: ./.github/actions/setup-terraform-oidc
        with:
          aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          working-directory: ./terraform
          tf-state-bucket: ${{ vars.TF_STATE_BUCKET }}
          tf-state-key: 'infra/dev/terraform.tfstate' 

      - name: Terraform ${{ github.event.inputs.action }}
        working-directory: ./terraform
        run: |
          if [[ "${{ github.event.inputs.action }}" == "apply" ]]; then
            terraform apply -auto-approve -var-file="envs/dev.tfvars" \
          else
            terraform destroy -auto-approve -var-file="envs/dev.tfvars" \
          fi