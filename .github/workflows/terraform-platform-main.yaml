name: Apply Platform (ArgoCD, Karpenter, etc.)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment (dev/prod)'
        required: true
        default: 'dev'
        type: choice
        options: ['dev', 'prod']
  push:
    branches: [ main ]
    paths:
      - 'terraform/platform/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'terraform/platform/**'

permissions:
  id-token: write
  contents: read

jobs:
  env:
    uses: ./.github/workflows/determine-environment.yaml

  plan-crds:
    needs: env
    uses: ./.github/workflows/terraform-plan.yaml
    with:
      working-directory: ./terraform/platform/crds
      aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
      aws-region: ${{ vars.AWS_REGION }}
      tf-state-bucket: ${{ vars.TF_STATE_BUCKET }}
      tf-state-key: platform/${{ needs.env.outputs.environment }}/terraform.tfstate
      environment: ${{ needs.env.outputs.environment }}


  apply-crds:
    needs: [env, plan-crds]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/terraform-apply.yaml
    with:
      working-directory: ./terraform/platform/crds
      aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
      aws-region: ${{ vars.AWS_REGION }}
      tf-state-bucket: ${{ vars.TF_STATE_BUCKET }}
      tf-state-key: platform/${{ needs.env.outputs.environment }}/crds/terraform.tfstate

  plan-manifests:
    needs: apply-crds   
    uses: ./.github/workflows/terraform-plan.yaml
    with:
      working-directory: ./terraform/platform/manifests
      aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
      aws-region: ${{ vars.AWS_REGION }}
      tf-state-bucket: ${{ vars.TF_STATE_BUCKET }}
      tf-state-key: platform/${{ needs.env.outputs.environment }}/manifests/terraform.tfstate
      environment: ${{ needs.env.outputs.environment }}

  apply-manifests:
    needs: [env, plan-manifests]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch')
    uses: ./.github/workflows/terraform-apply.yaml
    with:
      working-directory: ./terraform/platform/manifests
      aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
      aws-region: ${{ vars.AWS_REGION }}
      tf-state-bucket: ${{ vars.TF_STATE_BUCKET }}
      tf-state-key: platform/${{ needs.env.outputs.environment }}/manifests/terraform.tfstate

  create-and-verify:
    runs-on: ubuntu-latest
    needs: [apply-manifests, env]
    permissions:
     id-token: write
     contents: read
    steps:
    - uses: actions/checkout@v4

    - name: Setup Terraform and AWS (infrastructure)
      uses: ./.github/actions/setup-terraform-oidc
      with:
        aws-role-arn: ${{ vars.AWS_ROLE_ARN }}
        aws-region: ${{ vars.AWS_REGION }}
        working-directory: ./terraform/infrastructure
        tf-state-bucket: ${{ vars.TF_STATE_BUCKET }}
        tf-state-key: infra/${{ needs.env.outputs.environment }}/terraform.tfstate
        environment: ${{ needs.env.outputs.environment }}

    - name: Get cluster name and endpoint
      id: get_cluster
      working-directory: ./terraform/infrastructure
      run: |
        echo "cluster_name=$(terraform output -raw cluster_name)" >> $GITHUB_OUTPUT
        echo "cluster_endpoint=$(terraform output -raw cluster_endpoint)" >> $GITHUB_OUTPUT

    - name: Configure kubectl
      run: aws eks update-kubeconfig --region ${{ vars.AWS_REGION }} --name ${{ steps.get_cluster.outputs.cluster_name }}

    - name: Create ARC GitHub App secret in cluster
      run: |
        kubectl create namespace arc-systems --dry-run=client -o yaml | kubectl apply -f -
        kubectl create secret generic github-app-auth \
          -n arc-systems \
          --dry-run=client \
          --from-literal=cluster_name=${{ steps.get_cluster.outputs.cluster_name }} \
          --from-literal=cluster_endpoint=${{ steps.get_cluster.outputs.cluster_endpoint }} \
          --from-literal=github_app_id=${{ secrets.ARC_APP_ID }} \
          --from-literal=github_app_installation_id=${{ secrets.ARC_APP_INSTALLATION_ID }} \
          --from-literal=github_app_private_key="${{ secrets.ARC_APP_PRIVATE_KEY }}" \
          -o yaml | kubectl apply -f -

    - name: Quick component check
      run: |
        echo "=== Verifying platform components ==="
        kubectl get pods -n argocd -l app.kubernetes.io/name=argocd-server && echo "✅ ArgoCD OK" || echo "❌ ArgoCD not ready"
        kubectl get pods -n kube-system -l app.kubernetes.io/name=karpenter && echo "✅ Karpenter OK" || echo "❌ Karpenter not found"
        kubectl get pods -n gpu-operator 2>/dev/null && echo "✅ GPU Operator OK" || echo "❌ GPU Operator not found"
        kubectl get pods -n monitoring 2>/dev/null && echo "✅ Prometheus stack OK" || echo "❌ Prometheus stack not found"
        kubectl get pods -n arc-systems 2>/dev/null && echo "✅ ARC controller OK" || echo "❌ ARC controller not found"