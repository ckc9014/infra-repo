apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: training-job-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack  
spec:
  selector:
    matchLabels:
      app: training-job
  namespaceSelector:
    matchNames:
      - training
  endpoints:
    - port: metrics
      interval: 30s
      path: /metrics