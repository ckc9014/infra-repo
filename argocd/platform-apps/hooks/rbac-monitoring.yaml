apiVersion: v1
kind: ServiceAccount
metadata:
  name: hook-sa
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hook-role
  namespace: monitoring
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list","delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hook-rb
  namespace: monitoring
subjects:
- kind: ServiceAccount
  name: hook-sa
  namespace: monitoring
roleRef:
  kind: Role
  name: hook-role
  apiGroup: rbac.authorization.k8s.io