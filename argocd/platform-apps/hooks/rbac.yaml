---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patch-admission-sa
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: patch-admission-role
  namespace: monitoring
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: patch-admission-rb
  namespace: monitoring
subjects:
- kind: ServiceAccount
  name: patch-admission-sa
  namespace: monitoring
roleRef:
  kind: Role
  name: patch-admission-role
  apiGroup: rbac.authorization.k8s.io
---
# ServiceAccount and Role for GPU GC hook
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patch-gpu-gc-sa
  namespace: gpu-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: patch-gpu-gc-role
  namespace: gpu-operator
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: patch-gpu-gc-rb
  namespace: gpu-operator
subjects:
- kind: ServiceAccount
  name: patch-gpu-gc-sa
  namespace: gpu-operator
roleRef:
  kind: Role
  name: patch-gpu-gc-role
  apiGroup: rbac.authorization.k8s.io