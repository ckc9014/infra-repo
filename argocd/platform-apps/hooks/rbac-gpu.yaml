apiVersion: v1
kind: ServiceAccount
metadata:
  name: hook-sa
  namespace: gpu-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hook-role
  namespace: gpu-operator
rules:
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["patch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hook-rb
  namespace: gpu-operator
subjects:
- kind: ServiceAccount
  name: hook-sa
  namespace: gpu-operator
roleRef:
  kind: Role
  name: hook-role
  apiGroup: rbac.authorization.k8s.io