apiVersion: batch/v1
kind: Job
metadata:
  name: patch-monitoring-admission
  namespace: monitoring
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  template:
    spec:
      serviceAccountName: hook-sa
      restartPolicy: Never
      containers:
      - name: kubectl
        image: bitnami/kubectl:latest
        command:
        - /bin/sh
        - -c
        - |
          # Wait for the job to exist
          until kubectl get job monitoring-stack-kube-prom-admission-create -n monitoring; do sleep 2; done
          # Patch the job
          kubectl patch job monitoring-stack-kube-prom-admission-create -n monitoring --type json -p='[{"op": "add", "path": "/spec/template/spec/tolerations", "value": [{"key":"CriticalAddonsOnly","operator":"Equal","value":"true","effect":"NoSchedule"}]}]' || true
          # Delete any pending pods
          kubectl delete pod -n monitoring -l job-name=monitoring-stack-kube-prom-admission-create --ignore-not-found