githubConfigUrl: "https://github.com/ckc9014/training-job"
githubConfigSecret: "github-app-auth"
runnerScaleSetName: "gpu-runner-set"
labels: {}
minRunners: 0
maxRunners: 5

template:
  spec:
    volumes:                         # <-- add this block
      - name: work                   # <-- name must be "work"
        emptyDir: {}                 # <-- use emptyDir (no PVC)
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: CriticalAddonsOnly       # <-- add this to tolerate the taint
        operator: Equal
        value: "true"
        effect: NoSchedule
    containers:
      - name: runner
        image: "ghcr.io/actions/actions-runner:latest"
        resources:
          limits:
            cpu: "200m"
            memory: "16Gi"
          requests:
            cpu: "200m"
            memory: "8Gi"
        # volumeMounts are handled by the chart automatically for the "work" volume

containerMode:
  type: kubernetes                   # <-- back to kubernetes mode

controllerServiceAccount:
  namespace: "arc-systems"
  name: "arc-gha-rs-controller"