githubConfigUrl: "https://github.com/ckc9014/training-job"
githubConfigSecret: "github-app-auth"
runnerScaleSetName: "gpu-runner-set"
labels: {}
minRunners: 0
maxRunners: 5

listenerTemplate:
  spec:
    tolerations:
      - key: CriticalAddonsOnly
        operator: Equal
        value: "true"
        effect: NoSchedule
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi

template:
  spec:
    volumes:                         # <-- add this block
      - name: work                   # <-- name must be "work"
        emptyDir: {}                 # <-- use emptyDir (no PVC)
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
      - key: CriticalAddonsOnly       # <-- add this to tolerate the taint
        operator: Equal
        value: "true"
        effect: NoSchedule
    nodeSelector:
            node.kubernetes.io/instance-type: g4dn.xlarge     
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: karpenter.sh/nodepool
                  operator: In
                  values:
                    - gpu-nodepool
    containers:
      - name: runner
        image: "ghcr.io/actions/actions-runner:latest"
        resources:
          limits:
            cpu: "200m"
            memory: "16Gi"
          requests:
            cpu: "200m"
            memory: "8Gi"
        # volumeMounts are handled by the chart automatically for the "work" volume

containerMode:
  type: kubernetes                  

controllerServiceAccount:
  namespace: "arc-systems"
  name: "arc-gha-rs-controller"