githubConfigUrl: "https://github.com/ckc9014/training-job"
githubConfigSecret: "github-app-auth"
runnerScaleSetName: "gpu-runner-set"
labels:
  - "gpu-runner"
minRunners: 0
maxRunners: 5
template:
  spec:
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    containers:
      - name: runner
        image: "ghcr.io/actions/actions-runner:latest"
        resources:
          limits:
            cpu: 200m
            memory: 16Gi
            nvidia.com/gpu: 1
          requests:
            cpu: 200m
            memory: 8Gi
            nvidia.com/gpu: 1
containerMode:
  type: "kubernetes"