githubConfigUrl: "https://github.com/ckc9014/training-job"
githubConfigSecret: "github-app-auth"
runnerScaleSetName: "gpu-runner-set"
labels: {} 
minRunners: 0
maxRunners: 5
template:
  spec:
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: "true"
        effect: NoSchedule
    volumes:
    - name: ephemeral-storage
      ephemeral:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
    containers:
      - name: runner
        image: "ghcr.io/actions/actions-runner:latest"
        resources:
          limits:
            cpu: "200m"
            memory: "16Gi"
          requests:
            cpu: "200m"
            memory: "8Gi"
containerMode:
  type: "kubernetes"
  kubernetes:
    workVolume:
      emptyDir: {} 
controllerServiceAccount:
  namespace: "arc-systems"  
  name: "arc-gha-rs-controller"