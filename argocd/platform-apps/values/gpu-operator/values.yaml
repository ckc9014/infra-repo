operator:
  defaultRuntime: containerd
  tolerations:
    - key: "CriticalAddonsOnly"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

driver:
  enabled: true
  # version: "550.144.03" # default for chart v26.3.1

toolkit:
  enabled: true

devicePlugin:
  enabled: true

dcgmExporter:
  enabled: true

serviceMonitor:
  enabled: true

migManager:
  enabled: false

nodeStatusExporter:
  enabled: true

# Global toleration for all GPU‑operator DaemonSets (driver, device plugin, etc.)
tolerations:
  - key: "nvidia.com/gpu"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"
  - key: "CriticalAddonsOnly"      # ← Add this
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"

# NFD (Node Feature Discovery) sub‑chart configuration
nfd:
  enabled: true
  worker:
    tolerations:
      - key: "CriticalAddonsOnly"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
  master:
    enableTaints: true
    tolerations:
      - key: "CriticalAddonsOnly"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
  gc:
    tolerations:
      - key: "CriticalAddonsOnly"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule" 