apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-rollouts
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
  # Source 1: The public Argo Rollouts Helm chart
  - repoURL: https://argoproj.github.io/argo-helm
    chart: argo-rollouts
    targetRevision: 2.40.5
    helm:
      valueFiles:
      - $values/platform-apps/values/argo-rollouts/values.yaml

  # Source 2: Your private Git repo containing the values file
  - repoURL: https://github.com/your-org/infra-repo.git
    targetRevision: main
    ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: argo-rollouts
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    dependsOn:
    - monitoring-stack 
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true