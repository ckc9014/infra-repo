apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-gpu-operator
  namespace: argocd
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://helm.ngc.nvidia.com/nvidia
    chart: gpu-operator
    targetRevision: v26.3.1
    helm:
      values: |
        operator:
          defaultRuntime: containerd
        driver:
          enabled: true
          version: "550.144.03"
        toolkit:
          enabled: true
        devicePlugin:
          enabled: true
        dcgmExporter:
          enabled: true
        serviceMonitor:
          enabled: true
        migManager:
          enabled: false
        nodeStatusExporter:
          enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: gpu-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true