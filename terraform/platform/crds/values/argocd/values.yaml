server:
  insecure: true
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
  config:
    accounts:
      kubectl:
        enable: true


global:
  nodeSelector:
    node.kubernetes.io/instance-type: t3.small     
  tolerations:
    - key: CriticalAddonsOnly
      operator: Equal
      value: "true"
      effect: NoSchedule

repoServer:
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
controller:
  resources:
    requests:
      cpu: 300m
      memory: 512Mi